name: Validate APP manifests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout distribution repo
        uses: actions/checkout@v4
        with:
          path: portfolio-coach-app

      - name: Checkout APP Standards Workbench
        uses: actions/checkout@v4
        with:
          repository: 4jeffclark/agent-playbook-pack
          path: agent-playbook-pack

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validator dependencies
        run: pip install pyyaml jsonschema

      - name: Validate pack and playbook manifests
        run: |
          python agent-playbook-pack/standard/validate-manifests.py \
            portfolio-coach-app/portfolio-coach.app/pack.app.yaml \
            portfolio-coach-app/portfolio-coach.app/layer3-playbooks/source-profile/source-profile.app.yaml
