pacsVersion: '0.1'
kind: pack
packId: portfolio-coach
name: PortfolioCoach
version: '4.0.4'
description: >-
  E*TRADE portfolio analysis pack — six member playbooks with composable overlays.
  Scaffold skills; agent-authored narrative per PACS. v4.0.4 fixes period-start MV
  when no holdings on/before analysis start, aligned ingest symbol-universe delta,
  and D3 fixture docs for v4.0.3+ pass path.
license: TBD
compatibility:
  agentSkills: '>=1.0'
inputs:
  userDatastore:
    type: datastore
    required: true
    description: User-controlled storage per contracts/user-datastore-layout.md
    layoutContract: contracts/user-datastore-layout.md
  agentWorkspace:
    type: workspace
    required: false
    description: Optional ephemeral workspace; execution agent chooses and cleans up when omitted
playbooks:
  - datastore-inventory
  - datastore-ingest
  - market-regime-review
  - portfolio-composition-review
  - trading-activity-review
  - symbol-trade-review
