pacsVersion: '0.1'
kind: pack
packId: portfolio-coach
name: PortfolioCoach
version: '4.0.5'
description: >-
  E*TRADE portfolio analysis pack — six member playbooks with composable overlays.
  Scaffold skills; agent-authored narrative per PACS. v4.0.5 fixes stale-position MV
  snapshot scope, RollupLens propagation across composition skills, order Side parsing
  (Limit EXT / Market CLO), rebalancing/risk hint scaffolds, and position-snapshot
  readiness metrics in datastore inventory.
license: TBD
compatibility:
  agentSkills: '>=1.0'
inputs:
  userDatastore:
    type: datastore
    required: true
    description: User-controlled storage per contracts/user-datastore-layout.md
    layoutContract: contracts/user-datastore-layout.md
  agentWorkspace:
    type: workspace
    required: false
    description: Optional ephemeral workspace; execution agent chooses and cleans up when omitted
playbooks:
  - datastore-inventory
  - datastore-ingest
  - market-regime-review
  - portfolio-composition-review
  - trading-activity-review
  - symbol-trade-review
