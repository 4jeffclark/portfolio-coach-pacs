appVersion: '0.1'
kind: playbook
id: datastore-inventory
packId: portfolio-coach
version: '1.0.0'
description: Inventory the bound user datastore for coverage, quality, and activity ranges.
playbookReportId: DatastoreInventory
defaultResolution:
  period: fullAvailableRange
inputs:
  evaluation:
    type: boolean
    default: true
    description: Include evaluation overlay (readiness insights and exit interview)
  analysisPeriodStart:
    type: date
    description: Analysis period start (YYYYMMDD)
  analysisPeriodEnd:
    type: date
    description: Analysis period end (YYYYMMDD)
requires:
  - workflow: ../../layer0-workflows/datastore-merge-and-validate
  - workflow: ../../layer0-workflows/structured-input-discovery
uses:
  - skill: ../../layer1-skills/datastore-inventory
overlays:
  - id: datastore-inventory-evaluation
    path: ../../layer2-overlays/datastore-inventory-evaluation.md
    kind: evaluation
    when: evaluation == true
gates:
  - id: datastore-merge-complete
    after: datastore-merge-and-validate
    description: Session attachments merged or existing canonical validated
  - id: inputs-resolved
    after: structured-input-discovery
    description: Playbook inputs resolved or confirmed with defaults
  - id: output-written
    after: outputs
    description: Primary report written per output contract
outputs:
  primary:
    type: report
    pathTemplate: '{userDatastore}/reports/{timestamp}-DatastoreInventory-{{analysisPeriodStart}}-{{analysisPeriodEnd}}/{timestamp}-DatastoreInventory-{{analysisPeriodStart}}-{{analysisPeriodEnd}}.md'
    contract: contracts/datastore-inventory-report-artifact-contract.md
