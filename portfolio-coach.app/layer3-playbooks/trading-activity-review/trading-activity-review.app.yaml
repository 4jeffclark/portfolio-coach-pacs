appVersion: '0.1'
kind: playbook
id: trading-activity-review
packId: portfolio-coach
version: '1.0.0'
description: Trading activity debrief for a confirmed period.
playbookReportId: TradingActivityReview
defaultResolution:
  period: requireExplicit
inputs:
  evaluation:
    type: boolean
    default: true
    description: Include evaluation overlay
  analysisPeriodStart:
    type: date
    description: Analysis period start (YYYYMMDD)
  analysisPeriodEnd:
    type: date
    description: Analysis period end (YYYYMMDD)
requires:
  - workflow: ../../layer0-workflows/datastore-merge-and-validate
  - workflow: ../../layer0-workflows/structured-input-discovery
  - workflow: ../../layer0-workflows/period-scope-confirmation
uses:
  - skill: ../../layer1-skills/trading-activity-analysis
  - skill: ../../layer1-skills/market-environment
overlays:
  - id: trading-activity-evaluation
    path: ../../layer2-overlays/trading-activity-evaluation.md
    kind: evaluation
    when: evaluation == true
gates:
  - id: datastore-merge-complete
    after: datastore-merge-and-validate
    description: Canonical validated
  - id: inputs-resolved
    after: structured-input-discovery
    description: Playbook inputs resolved
  - id: period-confirmed
    after: period-scope-confirmation
    description: Analysis period confirmed
  - id: entry-interview
    after: trading-activity-evaluation
    when: evaluation == true
    description: Evaluation entry interview complete
  - id: output-written
    after: outputs
    description: Primary report written per output contract
outputs:
  primary:
    type: report
    pathTemplate: '{userDatastore}/reports/{timestamp}-TradingActivityReview-{{analysisPeriodStart}}-{{analysisPeriodEnd}}/Report.md'
    contract: contracts/trading-activity-review-report-artifact-contract.md
